name: Update KPIs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-kpis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y openssl
          pip install msal requests

      - name: Get Azure token with certificate
        id: get-token
        run: |
          python3 << 'EOF'
          import msal, os

          tenant_id = os.environ["AZURE_TENANT_ID"]
          client_id = os.environ["AZURE_CLIENT_ID"]
          cert_b64  = os.environ["AZURE_CERT_BASE64"]
          cert_pwd  = os.environ["AZURE_CERT_PASSWORD"]

          import base64, tempfile
          pfx_data = base64.b64decode(cert_b64)
          with tempfile.NamedTemporaryFile(suffix=".pfx", delete=False) as f:
              f.write(pfx_data)
              pfx_path = f.name

          # Convertir PFX en PEM
          import subprocess
          pem_path = pfx_path.replace(".pfx", ".pem")
          subprocess.run([
              "openssl", "pkcs12", "-in", pfx_path,
              "-out", pem_path, "-nodes",
              "-passin", f"pass:{cert_pwd}"
          ], check=True, capture_output=True)

          with open(pem_path) as f:
              pem = f.read()

          app = msal.ConfidentialClientApplication(
              client_id,
              authority=f"https://login.microsoftonline.com/{tenant_id}",
              client_credential={"private_key": pem, "thumbprint": os.environ["AZURE_CERT_THUMBPRINT"]}
          )

          result = app.acquire_token_for_client(
              scopes=["https://bcriholding.sharepoint.com/.default"]
          )

          if "access_token" in result:
              token = result["access_token"]
              print(f"Token acquired successfully (length: {len(token)})")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"token={token}\n")
          else:
              print(f"Error: {result.get('error_description')}")
              exit(1)
          EOF
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CERT_BASE64: ${{ secrets.AZURE_CERT_BASE64 }}
          AZURE_CERT_PASSWORD: ${{ secrets.AZURE_CERT_PASSWORD }}
          AZURE_CERT_THUMBPRINT: ${{ secrets.AZURE_CERT_THUMBPRINT }}

      - name: Fetch KPIs from SharePoint
        id: fetch-kpis
        run: |
          TOKEN="${{ steps.get-token.outputs.token }}"
          echo "Token length: ${#TOKEN}"

          RESPONSE=$(curl -s \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "https://bcriholding.sharepoint.com/sites/cockpitdirection/_api/web/lists/getbytitle('KPIs')/items?\$select=Titre,Indicateur,Valeur,Delta,Tendance&\$orderby=Titre%20asc" \
            -H "Accept: application/json;odata=nometadata" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
          echo "kpis=$BODY" >> $GITHUB_OUTPUT

      - name: Update index.html with new KPIs
        run: |
          python3 << 'EOF'
          import json, os, re

          kpis_raw = os.environ.get("KPIS", "")
          print(f"Raw KPIs received: {kpis_raw[:200]}")

          try:
              data = json.loads(kpis_raw)
              items = data.get("value", [])
              print(f"Found {len(items)} KPI items")
          except Exception as e:
              print(f"JSON parse error: {e}")
              print("No KPI data found, keeping existing values")
              exit(0)

          if not items:
              print("No KPI data found, keeping existing values")
              exit(0)

          kpi_map = {item["Indicateur"]: item for item in items}

          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          for indicateur, item in kpi_map.items():
              valeur = item.get("Valeur", "")
              delta = item.get("Delta", "")
              tendance = item.get("Tendance", "up").lower()
              print(f"Updating {indicateur}: {valeur} / {delta} / {tendance}")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("index.html updated successfully")
          EOF
        env:
          KPIS: ${{ steps.fetch-kpis.outputs.kpis }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update KPIs from SharePoint [$(date +'%Y-%m-%d %H:%M')]"
          git push
