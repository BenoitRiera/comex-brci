name: Update KPIs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-kpis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install msal requests openpyxl --quiet

      - name: Get Azure token
        id: get-token
        run: |
          python3 << 'EOF'
          import msal, os, base64, tempfile, subprocess

          tenant_id  = os.environ["AZURE_TENANT_ID"]
          client_id  = os.environ["AZURE_CLIENT_ID"]
          cert_b64   = os.environ["AZURE_CERT_BASE64"]
          cert_pwd   = os.environ["AZURE_CERT_PASSWORD"]
          thumbprint = os.environ["AZURE_CERT_THUMBPRINT"]

          pfx_data = base64.b64decode(cert_b64)
          with tempfile.NamedTemporaryFile(suffix=".pfx", delete=False) as f:
              f.write(pfx_data)
              pfx_path = f.name

          pem_path = pfx_path.replace(".pfx", ".pem")
          subprocess.run([
              "openssl", "pkcs12", "-in", pfx_path,
              "-out", pem_path, "-nodes",
              "-passin", f"pass:{cert_pwd}"
          ], check=True, capture_output=True)

          with open(pem_path) as f:
              pem = f.read()

          app = msal.ConfidentialClientApplication(
              client_id,
              authority=f"https://login.microsoftonline.com/{tenant_id}",
              client_credential={"private_key": pem, "thumbprint": thumbprint}
          )

          result = app.acquire_token_for_client(
              scopes=["https://bcriholding.sharepoint.com/.default"]
          )

          if "access_token" in result:
              token = result["access_token"]
              print(f"Token acquired successfully (length: {len(token)})")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"token={token}\n")
          else:
              print(f"Error: {result.get('error_description')}")
              exit(1)
          EOF
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CERT_BASE64: ${{ secrets.AZURE_CERT_BASE64 }}
          AZURE_CERT_PASSWORD: ${{ secrets.AZURE_CERT_PASSWORD }}
          AZURE_CERT_THUMBPRINT: ${{ secrets.AZURE_CERT_THUMBPRINT }}

      - name: Download KPIs_synthese.xlsx from SharePoint
        run: |
          python3 << 'EOF'
          import requests, os
          from urllib.parse import quote

          token = os.environ["SP_TOKEN"]
          server_path = "/sites/Cokpit_Comex/Shared Documents/Général/KPIs_synthese.xlsx"
          encoded_path = quote(server_path, safe='/')

          url = (
              "https://bcriholding.sharepoint.com/sites/Cokpit_Comex/_api/web"
              f"/GetFileByServerRelativeUrl('{encoded_path}')/$value"
          )
          print(f"Downloading: {url}")

          resp = requests.get(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/octet-stream"
          })

          if resp.status_code == 200:
              with open("kpis_synthese.xlsx", "wb") as f:
                  f.write(resp.content)
              print(f"Downloaded kpis_synthese.xlsx ({len(resp.content):,} bytes)")
          else:
              print(f"Download failed: HTTP {resp.status_code}")
              print(resp.text[:500])
              exit(1)
          EOF
        env:
          SP_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Update detail pages from Excel
        run: |
          python3 << 'PYEOF'
          import openpyxl, re, json

          # Direct cell-reference mapping (same structure on every sheet)
          # Each entity: (val_col, val_start_row, ecart_col, ecart_start_row)
          ENTITIES = [
              ('Global',             'I', 48, 'M', 48),
              ('ESEIS',              'C',  6, 'G',  6),
              ('ESEIS Cleaning',     'C', 13, 'G', 13),
              ('ESEIS Pest Control', 'C', 20, 'G', 20),
              ('ALS',                'C', 27, 'G', 27),
              ('Café Coton',         'C', 34, 'G', 34),
              ('ESEIS Travaux',      'C', 41, 'G', 41),
          ]
          LABEL_COL   = 'A'
          FORMAT_COL  = 'B'
          LABEL_START = 6
          N_KPIS      = 4
          COLORS      = ['var(--teal)', 'var(--blue)', 'var(--amber)', 'var(--purple)']

          PAGE_TO_SHEET = {
              'finance.html':        'Finance',
              'commerce.html':       'Commerce',
              'operations.html':     'Opérations',
              'rh.html':             'Ressources Humaines',
              'management.html':     'Management',
              'informatique.html':   'Informatique',
              'implementation.html': 'Implémentation',
              'achats.html':         'Achats',
          }

          def raw(ws, col, row):
              return ws[f"{col}{row}"].value

          def fmt_val(v, unit):
              """Format a numeric value according to its unit."""
              if v is None: return '--'
              unit = (unit or '').strip()
              try:
                  n = float(v)
              except (ValueError, TypeError):
                  return str(v).strip()
              if unit == '%':
                  return f"{n*100:,.2f} %".replace(',', ' ').replace('.', ',')
              if unit == '€':
                  return f"{n:,.0f} €".replace(',', ' ')
              if unit:
                  # generic unit: round intelligently then append
                  formatted = f"{n:,.2f}".replace(',', ' ').replace('.', ',').rstrip('0').rstrip(',')
                  return f"{formatted} {unit}"
              # No unit: display integer if whole, else 2 decimals
              if n == int(n): return f"{int(n):,}".replace(',', ' ')
              return f"{n:,.2f}".replace(',', ' ').replace('.', ',')

          def fmt_ecart(v):
              """Format an écart vs N-1 (stored as decimal ratio, e.g. 0.084 = +8,4%)."""
              if v is None: return '—'
              try:
                  n = float(v)
              except (ValueError, TypeError):
                  return str(v).strip()
              sign = '+' if n >= 0 else ''
              return f"{sign}{n*100:,.1f} %".replace(',', ' ').replace('.', ',')

          def tendance(ecart_str):
              if '+' in str(ecart_str): return '▲', 'up'
              if ecart_str.startswith('-'): return '▼', 'dn'
              return '', ''

          wb = openpyxl.load_workbook('kpis_synthese.xlsx', data_only=True)

          for html_file, sheet_name in PAGE_TO_SHEET.items():
              if sheet_name not in wb.sheetnames:
                  print(f"Sheet '{sheet_name}' not found, skipping {html_file}")
                  continue

              ws = wb[sheet_name]
              print(f"Sheet '{sheet_name}' -> {html_file}")

              kpi_html = "\n    <!-- KPI-START -->\n"

              for i in range(N_KPIS):
                  label = str(raw(ws, LABEL_COL,  LABEL_START + i) or '').strip()
                  unit  = str(raw(ws, FORMAT_COL, LABEL_START + i) or '').strip()
                  color = COLORS[i]

                  # Collect all entity data with formatting applied
                  ent_data = {}
                  for ent_name, vc, vr, ec, er in ENTITIES:
                      val_raw   = raw(ws, vc, vr + i)
                      ecart_raw = raw(ws, ec, er + i)
                      ecart_str = fmt_ecart(ecart_raw)
                      ent_data[ent_name] = {
                          'val':   fmt_val(val_raw, unit),
                          'ecart': ecart_str,
                      }

                  # Default display = Global
                  default_val   = ent_data['Global']['val']
                  default_ecart = ent_data['Global']['ecart']
                  arrow, css    = tendance(default_ecart)
                  ecart_display = f"{arrow} {default_ecart}" if arrow else default_ecart

                  data_attr = json.dumps(ent_data, ensure_ascii=False).replace("'", "&#39;")

                  print(f"  KPI {i+1}: [{unit}] {label} | {default_val} | {default_ecart}")
                  kpi_html += (
                      f"    <div class=\"kpi\" style=\"border-top:2px solid {color}\""
                      f" data-kpi='{data_attr}'>\n"
                      f"      <div class=\"kpi-label\">{label}</div>\n"
                      f"      <div class=\"kpi-value\">{default_val}</div>\n"
                      f"      <div class=\"kpi-delta {css}\">{ecart_display}</div>\n"
                      f"    </div>\n"
                  )

              # Entity-switching script (activates filter buttons)
              kpi_html += "    <script>\n"
              kpi_html += "    (function(){\n"
              kpi_html += "      function switchEntity(name){\n"
              kpi_html += "        document.querySelectorAll('.kpi[data-kpi]').forEach(function(card){\n"
              kpi_html += "          var d=JSON.parse(card.dataset.kpi);\n"
              kpi_html += "          var e=d[name]||d['Global'];\n"
              kpi_html += "          card.querySelector('.kpi-value').textContent=e.val;\n"
              kpi_html += "          var el=card.querySelector('.kpi-delta');\n"
              kpi_html += "          var s=e.ecart;\n"
              kpi_html += "          var a=s.includes('+')?'▲':s.includes('-')?'▼':'';\n"
              kpi_html += "          el.textContent=a?a+' '+s:s;\n"
              kpi_html += "          el.className='kpi-delta '+(s.includes('+')?'up':s.includes('-')?'dn':'');\n"
              kpi_html += "        });\n"
              kpi_html += "      }\n"
              kpi_html += "      document.querySelectorAll('.filter-btn').forEach(function(btn){\n"
              kpi_html += "        btn.addEventListener('click',function(){\n"
              kpi_html += "          document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});\n"
              kpi_html += "          btn.classList.add('active');\n"
              kpi_html += "          switchEntity(btn.textContent.trim());\n"
              kpi_html += "        });\n"
              kpi_html += "      });\n"
              kpi_html += "    })();\n"
              kpi_html += "    </script>\n"
              kpi_html += "    <!-- KPI-END -->"

              with open(html_file, 'r', encoding='utf-8') as f:
                  html = f.read()

              new_html = re.sub(
                  r'<!-- KPI-START -->.*?<!-- KPI-END -->',
                  kpi_html, html, flags=re.DOTALL
              )

              with open(html_file, 'w', encoding='utf-8') as f:
                  f.write(new_html)

              print(f"  -> {html_file} updated OK")

          PYEOF

      - name: Fetch KPIs from SharePoint list (index.html)
        id: fetch-kpis
        run: |
          TOKEN="${{ steps.get-token.outputs.token }}"
          echo "Token length: ${#TOKEN}"

          RESPONSE=$(curl -s \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "https://bcriholding.sharepoint.com/sites/cockpitdirection/_api/web/lists/getbytitle('KPIs')/items?\$select=Title,Indicateur,Valeur,Delta,Tendance&\$orderby=Title%20asc" \
            -H "Accept: application/json;odata=nometadata" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
          echo "kpis=$BODY" >> $GITHUB_OUTPUT

      - name: Update index.html with new KPIs
        run: |
          python3 << 'PYEOF'
          import json, os, re

          kpis_raw = os.environ.get("KPIS", "")
          print(f"Raw KPIs received: {kpis_raw[:200]}")

          try:
              data = json.loads(kpis_raw)
              items = data.get("value", [])
              print(f"Found {len(items)} KPI items")
          except Exception as e:
              print(f"JSON parse error: {e}")
              exit(0)

          if not items:
              print("No KPI data found, keeping existing values")
              exit(0)

          colors = ['var(--teal)', 'var(--blue)', 'var(--amber)', 'var(--purple)']
          arrow_up = '▲'
          arrow_dn = '▼'

          kpi_html = "\n    <!-- KPI-START -->\n"
          for i, item in enumerate(items):
              indicateur = item.get("Indicateur", "")
              valeur     = item.get("Valeur", "")
              delta      = item.get("Delta", "")
              tendance   = (item.get("Tendance") or "up").lower()
              color      = colors[i % len(colors)]
              css_class  = "up" if tendance == "up" else "dn"
              arrow      = arrow_up if tendance == "up" else arrow_dn
              print(f"KPI: {indicateur} | {valeur} | {delta} | {tendance}")
              kpi_html += (
                  f'    <div class="kpi" style="border-top: 2px solid {color}">\n'
                  f'      <div class="kpi-label">{indicateur}</div>\n'
                  f'      <div class="kpi-value">{valeur}</div>\n'
                  f'      <div class="kpi-delta {css_class}">{arrow} {delta}</div>\n'
                  f'    </div>\n'
              )
          kpi_html += "    <!-- KPI-END -->"

          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          new_html = re.sub(
              r'<!-- KPI-START -->.*?<!-- KPI-END -->',
              kpi_html,
              html,
              flags=re.DOTALL
          )

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(new_html)

          print("index.html updated successfully")
          PYEOF
        env:
          KPIS: ${{ steps.fetch-kpis.outputs.kpis }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save freshly generated files before syncing with remote
          FILES="index.html finance.html commerce.html operations.html rh.html management.html informatique.html implementation.html achats.html"
          for f in $FILES; do cp "$f" "/tmp/$f"; done

          # Reset to latest remote state (avoids stash/merge conflicts)
          git fetch origin main
          git reset --hard origin/main

          # Restore generated files on top of latest remote
          for f in $FILES; do cp "/tmp/$f" "$f"; done

          git add $FILES
          git diff --staged --quiet || git commit -m "Update KPIs from SharePoint [$(date +'%Y-%m-%d %H:%M')]"
          git push
