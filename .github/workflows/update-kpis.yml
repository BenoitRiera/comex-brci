name: Update KPIs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-kpis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install msal requests openpyxl --quiet

      - name: Get Azure token
        id: get-token
        run: |
          python3 << 'EOF'
          import msal, os, base64, tempfile, subprocess

          tenant_id  = os.environ["AZURE_TENANT_ID"]
          client_id  = os.environ["AZURE_CLIENT_ID"]
          cert_b64   = os.environ["AZURE_CERT_BASE64"]
          cert_pwd   = os.environ["AZURE_CERT_PASSWORD"]
          thumbprint = os.environ["AZURE_CERT_THUMBPRINT"]

          pfx_data = base64.b64decode(cert_b64)
          with tempfile.NamedTemporaryFile(suffix=".pfx", delete=False) as f:
              f.write(pfx_data)
              pfx_path = f.name

          pem_path = pfx_path.replace(".pfx", ".pem")
          subprocess.run([
              "openssl", "pkcs12", "-in", pfx_path,
              "-out", pem_path, "-nodes",
              "-passin", f"pass:{cert_pwd}"
          ], check=True, capture_output=True)

          with open(pem_path) as f:
              pem = f.read()

          app = msal.ConfidentialClientApplication(
              client_id,
              authority=f"https://login.microsoftonline.com/{tenant_id}",
              client_credential={"private_key": pem, "thumbprint": thumbprint}
          )

          result = app.acquire_token_for_client(
              scopes=["https://bcriholding.sharepoint.com/.default"]
          )

          if "access_token" in result:
              token = result["access_token"]
              print(f"Token acquired successfully (length: {len(token)})")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"token={token}\n")
          else:
              print(f"Error: {result.get('error_description')}")
              exit(1)
          EOF
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CERT_BASE64: ${{ secrets.AZURE_CERT_BASE64 }}
          AZURE_CERT_PASSWORD: ${{ secrets.AZURE_CERT_PASSWORD }}
          AZURE_CERT_THUMBPRINT: ${{ secrets.AZURE_CERT_THUMBPRINT }}

      - name: Download KPIs_synthese.xlsx from SharePoint
        run: |
          python3 << 'EOF'
          import requests, os
          from urllib.parse import quote

          token = os.environ["SP_TOKEN"]
          server_path = "/sites/Cokpit_Comex/Shared Documents/Général/KPIs_synthese.xlsx"
          encoded_path = quote(server_path, safe='/')

          url = (
              "https://bcriholding.sharepoint.com/sites/Cokpit_Comex/_api/web"
              f"/GetFileByServerRelativeUrl('{encoded_path}')/$value"
          )
          print(f"Downloading: {url}")

          resp = requests.get(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/octet-stream"
          })

          if resp.status_code == 200:
              with open("kpis_synthese.xlsx", "wb") as f:
                  f.write(resp.content)
              print(f"Downloaded kpis_synthese.xlsx ({len(resp.content):,} bytes)")
          else:
              print(f"Download failed: HTTP {resp.status_code}")
              print(resp.text[:500])
              exit(1)
          EOF
        env:
          SP_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Update detail pages from Excel
        run: |
          python3 << 'PYEOF'
          import openpyxl, re

          SHEET_TO_FILE = {
              'Finance':              'finance.html',
              'Commerce':             'commerce.html',
              'Operations':           'operations.html',
              'Opérations':           'operations.html',
              'RH':                   'rh.html',
              'Ressources humaines':  'rh.html',
              'Management':           'management.html',
              'Informatique':         'informatique.html',
              'IT':                   'informatique.html',
              'Implémentation':       'implementation.html',
              'Implementation':       'implementation.html',
              'Achats':               'achats.html',
          }

          COLORS = ['var(--teal)', 'var(--blue)', 'var(--amber)', 'var(--purple)']
          ARROW_UP = '▲'
          ARROW_DN = '▼'

          def find_col(headers, keywords):
              for kw in keywords:
                  for i, h in enumerate(headers):
                      if h and kw in h.lower():
                          return i
              return None

          def find_header_row(ws):
              """Scan rows 1-15 to find the one containing KPI/Indicateur/Valeur keywords."""
              keywords = ['kpi', 'indicateur', 'libellé', 'libelle', 'valeur', 'value']
              for row_idx in range(1, 16):
                  row_vals = [str(ws.cell(row=row_idx, column=c).value or '').strip()
                              for c in range(1, ws.max_column + 1)]
                  row_str = ' '.join(v.lower() for v in row_vals)
                  if any(kw in row_str for kw in keywords):
                      print(f"  Header row found at row {row_idx}: {row_vals[:5]}")
                      return row_idx, row_vals
              print("  No header row found, defaulting to row 1")
              return 1, [str(ws.cell(row=1, column=c).value or '').strip()
                         for c in range(1, ws.max_column + 1)]

          def infer_tendance(delta_str):
              s = str(delta_str)
              if '+' in s:
                  return ARROW_UP, 'up'
              if '-' in s or '−' in s:
                  return ARROW_DN, 'dn'
              return '', ''

          wb = openpyxl.load_workbook('kpis_synthese.xlsx', data_only=True)
          processed = set()

          for sheet_name in wb.sheetnames:
              html_file = SHEET_TO_FILE.get(sheet_name.strip())
              if not html_file or html_file in processed:
                  continue
              processed.add(html_file)

              ws = wb[sheet_name]
              print(f"Sheet '{sheet_name}' → {html_file}")

              header_row_idx, headers = find_header_row(ws)

              col_ind = find_col(headers, ['indicateur', 'libellé', 'libelle', 'kpi', 'nom'])
              col_val = find_col(headers, ['valeur', 'value'])
              col_uni = find_col(headers, ['unité', 'unite', 'unit'])
              col_del = find_col(headers, ['delta', 'variation', 'écart', 'ecart'])

              if col_ind is None: col_ind = 0
              if col_val is None: col_val = 1
              if col_del is None: col_del = 2

              print(f"  Columns → indicateur:{col_ind} valeur:{col_val} unité:{col_uni} delta:{col_del}")

              items = []
              for row in ws.iter_rows(min_row=header_row_idx + 1, values_only=True):
                  if not row or col_ind >= len(row) or not row[col_ind]:
                      continue
                  indicateur = str(row[col_ind]).strip()
                  # Skip rows that look like sub-headers or entity names
                  if indicateur.upper() == indicateur and len(indicateur) < 30 and row[col_val] is None:
                      continue
                  val_raw  = row[col_val] if col_val < len(row) else None
                  uni_raw  = row[col_uni] if col_uni is not None and col_uni < len(row) else None
                  del_raw  = row[col_del] if col_del < len(row) else None
                  # Format value: combine number + unit if available
                  if val_raw is not None:
                      val_str = str(val_raw)
                      if uni_raw:
                          val_str = f"{val_str} {uni_raw}"
                  else:
                      val_str = '--'
                  delta = str(del_raw) if del_raw is not None else '—'
                  items.append({'indicateur': indicateur, 'valeur': val_str, 'delta': delta})
                  print(f"  Row: {indicateur} | {val_str} | {delta}")

              if not items:
                  print(f"No data in sheet '{sheet_name}', skipping {html_file}")
                  continue

              kpi_html = "\n    <!-- KPI-START -->\n"
              for i, item in enumerate(items[:4]):
                  color = COLORS[i % len(COLORS)]
                  arrow, css_class = infer_tendance(item['delta'])
                  delta_display = f"{arrow} {item['delta']}" if arrow else item['delta']
                  kpi_html += (
                      f'    <div class="kpi" style="border-top:2px solid {color}">\n'
                      f'      <div class="kpi-label">{item["indicateur"]}</div>\n'
                      f'      <div class="kpi-value">{item["valeur"]}</div>\n'
                      f'      <div class="kpi-delta {css_class}">{delta_display}</div>\n'
                      f'    </div>\n'
                  )
              kpi_html += "    <!-- KPI-END -->"

              with open(html_file, 'r', encoding='utf-8') as f:
                  html = f.read()

              new_html = re.sub(
                  r'<!-- KPI-START -->.*?<!-- KPI-END -->',
                  kpi_html,
                  html,
                  flags=re.DOTALL
              )

              with open(html_file, 'w', encoding='utf-8') as f:
                  f.write(new_html)

              print(f"{html_file}: updated with {len(items[:4])} KPIs from sheet '{sheet_name}'")

          PYEOF

      - name: Fetch KPIs from SharePoint list (index.html)
        id: fetch-kpis
        run: |
          TOKEN="${{ steps.get-token.outputs.token }}"
          echo "Token length: ${#TOKEN}"

          RESPONSE=$(curl -s \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "https://bcriholding.sharepoint.com/sites/cockpitdirection/_api/web/lists/getbytitle('KPIs')/items?\$select=Title,Indicateur,Valeur,Delta,Tendance&\$orderby=Title%20asc" \
            -H "Accept: application/json;odata=nometadata" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
          echo "kpis=$BODY" >> $GITHUB_OUTPUT

      - name: Update index.html with new KPIs
        run: |
          python3 << 'PYEOF'
          import json, os, re

          kpis_raw = os.environ.get("KPIS", "")
          print(f"Raw KPIs received: {kpis_raw[:200]}")

          try:
              data = json.loads(kpis_raw)
              items = data.get("value", [])
              print(f"Found {len(items)} KPI items")
          except Exception as e:
              print(f"JSON parse error: {e}")
              exit(0)

          if not items:
              print("No KPI data found, keeping existing values")
              exit(0)

          colors = ['var(--teal)', 'var(--blue)', 'var(--amber)', 'var(--purple)']
          arrow_up = '▲'
          arrow_dn = '▼'

          kpi_html = "\n    <!-- KPI-START -->\n"
          for i, item in enumerate(items):
              indicateur = item.get("Indicateur", "")
              valeur     = item.get("Valeur", "")
              delta      = item.get("Delta", "")
              tendance   = (item.get("Tendance") or "up").lower()
              color      = colors[i % len(colors)]
              css_class  = "up" if tendance == "up" else "dn"
              arrow      = arrow_up if tendance == "up" else arrow_dn
              print(f"KPI: {indicateur} | {valeur} | {delta} | {tendance}")
              kpi_html += (
                  f'    <div class="kpi" style="border-top: 2px solid {color}">\n'
                  f'      <div class="kpi-label">{indicateur}</div>\n'
                  f'      <div class="kpi-value">{valeur}</div>\n'
                  f'      <div class="kpi-delta {css_class}">{arrow} {delta}</div>\n'
                  f'    </div>\n'
              )
          kpi_html += "    <!-- KPI-END -->"

          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          new_html = re.sub(
              r'<!-- KPI-START -->.*?<!-- KPI-END -->',
              kpi_html,
              html,
              flags=re.DOTALL
          )

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(new_html)

          print("index.html updated successfully")
          PYEOF
        env:
          KPIS: ${{ steps.fetch-kpis.outputs.kpis }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save freshly generated files before syncing with remote
          FILES="index.html finance.html commerce.html operations.html rh.html management.html informatique.html implementation.html achats.html"
          for f in $FILES; do cp "$f" "/tmp/$f"; done

          # Reset to latest remote state (avoids stash/merge conflicts)
          git fetch origin main
          git reset --hard origin/main

          # Restore generated files on top of latest remote
          for f in $FILES; do cp "/tmp/$f" "$f"; done

          git add $FILES
          git diff --staged --quiet || git commit -m "Update KPIs from SharePoint [$(date +'%Y-%m-%d %H:%M')]"
          git push
