name: Update KPIs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-kpis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure token
        id: get-token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://bcriholding.sharepoint.com/.default" \
            -d "grant_type=client_credentials" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch KPIs from SharePoint
        id: fetch-kpis
        run: |
          TOKEN="${{ steps.get-token.outputs.token }}"
          echo "Token length: ${#TOKEN}"

          RESPONSE=$(curl -s \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "https://bcriholding.sharepoint.com/sites/cockpitdirection/_api/web/lists/getbytitle('KPIs')/items?\$select=Titre,Indicateur,Valeur,Delta,Tendance&\$orderby=Titre%20asc" \
            -H "Accept: application/json;odata=nometadata" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
          echo "kpis=$BODY" >> $GITHUB_OUTPUT

      - name: Update index.html with new KPIs
        run: |
          python3 << 'EOF'
          import json, os, re

          kpis_raw = os.environ.get("KPIS", "")
          print(f"Raw KPIs received: {kpis_raw[:200]}")

          try:
              data = json.loads(kpis_raw)
              items = data.get("value", [])
              print(f"Found {len(items)} KPI items")
          except Exception as e:
              print(f"JSON parse error: {e}")
              print("No KPI data found, keeping existing values")
              exit(0)

          if not items:
              print("No KPI data found, keeping existing values")
              exit(0)

          kpi_map = {item["Indicateur"]: item for item in items}

          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          for indicateur, item in kpi_map.items():
              valeur = item.get("Valeur", "")
              delta = item.get("Delta", "")
              tendance = item.get("Tendance", "up").lower()
              print(f"Updating {indicateur}: {valeur} / {delta} / {tendance}")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("index.html updated successfully")
          EOF
        env:
          KPIS: ${{ steps.fetch-kpis.outputs.kpis }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update KPIs from SharePoint [$(date +'%Y-%m-%d %H:%M')]"
          git push
